<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Mood</title>
  <meta name="theme-color" content="#080b14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Movie Mood">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <style>
    :root {
      --ink: #f8f8ff;
      --muted: #9aa1b5;
      --line: rgba(255, 255, 255, .13);
      --gold: #ffc84d;
      --teal: #42dcc6;
      --blue: #83aaff;
      --danger: #ff6b7d;
      --shadow: 0 24px 80px rgba(0, 0, 0, .42);
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 5%, rgba(66, 220, 198, .17), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(255, 95, 117, .14), transparent 30%),
        linear-gradient(145deg, #111322 0%, #080b14 44%, #05070d 100%);
      overflow-x: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; color: inherit; cursor: pointer; }
    svg { width: 22px; height: 22px; flex: 0 0 auto; }

    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 22px 104px;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 5vw, 23px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hello p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .avatar {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #111322;
      font-weight: 900;
      font-size: 12px;
      background: linear-gradient(145deg, #a3e7ff, #ff8092);
      box-shadow: 0 6px 16px rgba(255, 95, 117, .18);
    }

    .search {
      height: 54px;
      display: grid;
      grid-template-columns: 26px 1fr 34px;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(32, 34, 53, .72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
      overflow: hidden;
    }

    .search-icon {
      width: 24px !important;
      height: 24px !important;
      max-width: 24px;
      max-height: 24px;
      display: block;
    }

    .search input {
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-size: 16px;
    }

    .search input::placeholder { color: #747b91; }

    .voice {
      height: 30px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border-left: 1px solid var(--line);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .home-stage {
      min-height: 648px;
      padding-top: 48px;
      position: relative;
      overflow: visible;
      touch-action: pan-y;
      user-select: none;
    }

    .deck-zone {
      height: 390px;
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      overflow: visible;
      isolation: isolate;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .movie-card {
      width: min(72vw, 292px);
      aspect-ratio: 2 / 3;
      position: absolute;
      overflow: hidden;
      border-radius: 24px;
      background: #151927;
      box-shadow: var(--shadow);
      transform-origin: center;
      --card-dim: 0;
      transition: transform .68s cubic-bezier(.18, .9, .16, 1), opacity .68s ease;
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .deck-zone.is-resetting .movie-card {
      transition: none;
    }

    .home-stage.is-dragging .movie-card,
    .home-stage.is-dragging .movie-info {
      transition: none;
    }

    .movie-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .movie-card:not(.is-active) {
      box-shadow: none;
    }

    .movie-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 56%, rgba(0, 0, 0, .72) 100%),
        rgba(0, 0, 0, var(--card-dim));
      transition: background .68s ease;
    }

    .movie-card.is-active {
      z-index: 5;
      cursor: grab;
    }

    .rating-pill {
      position: absolute;
      z-index: 2;
      left: 16px;
      bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(10, 12, 20, .68);
      backdrop-filter: blur(10px);
      font-weight: 850;
      font-size: 14px;
    }

    .movie-info {
      width: min(78vw, 330px);
      margin: 10px auto 0;
      text-align: center;
      opacity: 1;
      transform: translateY(0);
      transition: opacity .34s ease, transform .34s ease;
    }

    .movie-info h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .movie-info .meta {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 17px;
    }

    .movie-info p {
      margin: 0;
      color: rgba(255, 255, 255, .58);
      font-size: 15px;
      line-height: 1.45;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-head h2 { margin: 0; font-size: 24px; }
    .section-head span { color: var(--muted); font-size: 13px; }

    .primary, .ghost, .chip {
      min-height: 46px;
      border-radius: 999px;
      padding: 0 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .1);
      backdrop-filter: blur(12px);
    }

    .primary { color: #121522; background: #f8f9ff; font-weight: 850; }
    .ghost { color: var(--ink); background: rgba(255, 255, 255, .08); font-weight: 750; }
    .danger { color: #fff; background: rgba(255, 107, 125, .24); border-color: rgba(255, 107, 125, .45); }

    .list-grid { display: grid; gap: 14px; }

    .row-card {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: left;
      background: rgba(255, 255, 255, .07);
    }

    .row-card img { width: 76px; height: 108px; object-fit: cover; border-radius: 8px; }
    .row-card h3 { margin: 0 0 7px; font-size: 17px; }
    .row-card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .score { display: inline-flex; gap: 5px; margin-top: 9px; color: var(--gold); font-weight: 850; font-size: 14px; }

    .genre-shell {
      position: relative;
      margin: 0 -22px 16px;
      padding: 0 22px;
      overflow: hidden;
    }

    .genre-bar {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 2px 0 0;
      scrollbar-width: none;
    }

    .genre-bar::-webkit-scrollbar { display: none; }
    .chip { min-height: 38px; color: var(--muted); white-space: nowrap; }
    .chip.active { color: #071016; background: var(--teal); border-color: transparent; font-weight: 850; }
    .mini-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0 8px; }
    .mini-actions .ghost.active { color: #071016; background: var(--teal); border-color: transparent; }
    .admin-pick { display: inline-flex; margin: 0 0 12px; padding: 7px 10px; border-radius: 999px; background: rgba(255, 200, 77, .16); color: #ffd981; font-size: 13px; font-weight: 850; }

    .random-stage { min-height: 520px; display: grid; align-content: center; gap: 18px; }
    .random-poster { width: min(82vw, 330px); margin: 0 auto; aspect-ratio: 2 / 3; overflow: hidden; border-radius: 24px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .random-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .field { display: grid; gap: 7px; margin-bottom: 12px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 750; }
    .field input, .field textarea, .field select { width: 100%; border: 1px solid var(--line); border-radius: 8px; outline: 0; color: var(--ink); background: rgba(255, 255, 255, .08); padding: 12px; }
    .field textarea { resize: vertical; min-height: 82px; }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0 14px;
    }

    .check-grid label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .82);
      font-size: 13px;
    }

    .admin-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .admin-actions.three { grid-template-columns: 1fr 1fr 1fr; }

    .detail,
    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      overflow-y: auto;
      background: #080b14;
      transform: translateY(100%);
      transition: transform .36s ease;
    }

    .detail.active,
    .modal.active { transform: translateY(0); }

    .modal {
      z-index: 40;
      display: grid;
      align-items: end;
      background: rgba(4, 6, 12, .72);
      backdrop-filter: blur(18px);
    }

    .modal-card {
      width: min(100%, 520px);
      max-height: 92vh;
      overflow-y: auto;
      margin: 0 auto;
      padding: 20px;
      border-radius: 24px 24px 0 0;
      border: 1px solid var(--line);
      background: rgba(15, 18, 30, .96);
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head h2 { margin: 0; font-size: 22px; }

    .detail-hero {
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
      display: grid;
      align-items: end;
      padding: 18px 18px 24px;
      background-size: cover;
      background-position: center;
    }

    .detail-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 7, 13, .1), rgba(5, 7, 13, .26) 42%, rgba(5, 7, 13, .84));
    }

    .detail-top {
      position: absolute;
      z-index: 2;
      inset: 18px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .2);
      backdrop-filter: blur(12px);
    }

    .side-actions { display: grid; gap: 10px; }

    .detail-sheet {
      position: relative;
      z-index: 1;
      padding: 24px;
      border-radius: 24px;
      background: rgba(29, 24, 23, .58);
      border: 1px solid rgba(255, 255, 255, .16);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }

    .detail-sheet h2 { margin: 0 0 8px; font-size: 34px; line-height: 1; }
    .detail-sheet .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; color: rgba(255, 255, 255, .82); font-size: 14px; }
    .description { margin: 0 0 18px; color: rgba(255, 255, 255, .84); line-height: 1.5; font-size: 15px; }
    .reviews { display: grid; gap: 10px; margin: 18px 0; }
    .review { padding: 12px; border-radius: 8px; background: rgba(255, 255, 255, .09); color: rgba(255, 255, 255, .86); font-size: 13px; line-height: 1.42; }
    .detail-actions { display: grid; grid-template-columns: 1fr; gap: 10px; }

    .trailer-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 10, .86);
      backdrop-filter: blur(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease;
    }

    .trailer-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .trailer-box {
      width: min(100%, 920px);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .16);
      background: #080b14;
      box-shadow: var(--shadow);
    }

    .trailer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
    }

    .trailer-head h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .trailer-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .trailer-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .trailer-fallback {
      display: none;
      padding: 12px 14px 16px;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
    }

    .trailer-fallback a { color: #fff; font-weight: 800; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 20;
      width: min(calc(100% - 32px), 420px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(9, 12, 22, .74);
      backdrop-filter: blur(22px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .4);
    }

    .nav-btn {
      min-width: 0;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 4px;
      color: #858ba0;
      background: transparent;
      font-size: 11px;
      font-weight: 850;
    }

    .nav-btn.active { color: #fff; background: rgba(255, 255, 255, .1); }
    .empty { color: var(--muted); text-align: center; padding: 50px 16px; }

    @media (max-width: 380px) {
      .app { padding-inline: 16px; }
      .movie-card { width: 74vw; }
      .nav-btn { font-size: 10px; }
      .detail-sheet { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="hello">
        <h1>Movie Mood</h1>
        <p>Подберем фильм на вечер</p>
      </div>
      <button id="adminEntry" class="avatar" type="button" aria-label="Админ">M</button>
    </header>

    <form class="search" autocomplete="off" action="javascript:void(0)" role="search">
      <input type="text" name="email" autocomplete="username" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" name="film-query-field" placeholder="Поиск фильма" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search" data-lpignore="true" data-1p-ignore="true" data-form-type="other">
      <span class="voice" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 0 1-14 0M12 18v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
    </form>

    <section id="home" class="screen active">
      <div id="homeStage" class="home-stage">
        <div id="deck" class="deck-zone" aria-label="Свайп фильмов"></div>
        <div id="movieInfo" class="movie-info"></div>
      </div>
    </section>

    <section id="recommended" class="screen">
      <div class="section-head">
        <h2>Рекомендуемые</h2>
        <span id="recommendedCount"></span>
      </div>
      <div class="genre-shell">
        <div id="collectionBar" class="genre-bar"></div>
      </div>
      <div id="recommendedList" class="list-grid"></div>
    </section>

    <section id="genres" class="screen">
      <div class="section-head">
        <h2>По жанру</h2>
        <span>Выберите настроение</span>
      </div>
      <div class="genre-shell">
        <div id="moodBar" class="genre-bar"></div>
      </div>
      <div class="genre-shell">
        <div id="genreBar" class="genre-bar"></div>
      </div>
      <div id="genreList" class="list-grid"></div>
    </section>

    <section id="random" class="screen">
      <div class="section-head">
        <h2>Рандомный фильм</h2>
        <span id="randomHint">Умный подбор</span>
      </div>
      <div class="random-stage">
        <div id="randomPoster" class="random-poster"></div>
        <button id="randomBtn" class="primary" type="button">Подобрать фильм</button>
      </div>
    </section>
  </main>

  <aside id="detail" class="detail" aria-hidden="true">
    <div id="detailHero" class="detail-hero">
      <div class="detail-top">
        <button id="closeDetail" class="icon-btn" type="button" aria-label="Назад"><svg viewBox="0 0 24 24" fill="none"><path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="side-actions">
          <button class="icon-btn" type="button" id="addCurrent" aria-label="Добавить"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <button class="icon-btn" type="button" aria-label="Нравится"><svg viewBox="0 0 24 24" fill="none"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
      <div class="detail-sheet">
        <h2 id="detailTitle"></h2>
        <div id="detailMeta" class="meta"></div>
        <div id="detailAdminPick"></div>
        <p id="detailDescription" class="description"></p>
        <div id="detailReviews" class="reviews"></div>
        <div class="mini-actions">
          <button id="likeBtn" class="ghost" type="button">Нравится</button>
          <button id="dislikeBtn" class="ghost" type="button">Не мое</button>
          <button id="watchBtn" class="ghost" type="button">Хочу</button>
        </div>
        <div class="detail-actions"><button class="primary" type="button" id="trailerBtn">Смотреть трейлер</button></div>
      </div>
    </div>
  </aside>

  <aside id="trailerModal" class="trailer-modal" aria-hidden="true">
    <div class="trailer-box">
      <div class="trailer-head">
        <h2 id="trailerTitle">Трейлер</h2>
        <button id="closeTrailer" class="icon-btn" type="button" aria-label="Закрыть">×</button>
      </div>
      <div id="trailerFrame" class="trailer-frame"></div>
      <div id="trailerFallback" class="trailer-fallback"></div>
    </div>
  </aside>

  <nav class="bottom-nav" aria-label="Главное меню">
    <button class="nav-btn active" type="button" data-tab="home" aria-label="Главная"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5 12 4l9 7.5V21h-6v-5.5H9V21H3v-9.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>Главная</button>
    <button class="nav-btn" type="button" data-tab="recommended" aria-label="Рекомендуемые"><svg viewBox="0 0 24 24" fill="none"><path d="M7 5h10a2 2 0 0 1 2 2v14l-7-4-7 4V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>Рекоменд.</button>
    <button class="nav-btn" type="button" data-tab="genres" aria-label="По жанру"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 12h16M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 5v14M16 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Жанры</button>
    <button class="nav-btn" type="button" data-tab="random" aria-label="Рандомный фильм"><svg viewBox="0 0 24 24" fill="none"><path d="M16 3h5v5M21 3l-7.5 7.5M4 20l6.5-6.5M15 20h6v-6M21 20l-7.5-7.5M4 4l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Рандом</button>
  </nav>

  <script>
    const STORAGE_KEY = "movieMoodState";
    const imageBase = "https://image.tmdb.org/t/p/w780";

      { id: "poor-things", title: "Бедные-несчастные", year: 2023, time: "142 мин", rating: 7.8, genres: ["Комедия", "Драма", "Фэнтези"], poster: "https://image.tmdb.org/t/p/w780/kCGlIMHnOm8JPXq3rXM6c5wMxcT.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/bQS43HSLZzMjZkcHJz4fGc7fNdz.jpg", description: "Белла Бакстер открывает мир заново, превращая странное путешествие в историю свободы, любопытства и взросления.", reviews: [{ author: "Оля", text: "Очень необычно, визуально роскошно, местами смешно до неловкости." }, { author: "Денис", text: "Фильм не для всех, но если зайдет, запомнится надолго." }], placements: { home: true, recommended: false, genres: true, random: true } },
      { id: "oppenheimer", title: "Оппенгеймер", year: 2023, time: "181 мин", rating: 8.1, genres: ["История", "Драма", "Биография"], poster: "https://image.tmdb.org/t/p/w780/ptpr0kGAckfQkJeJIt8st5dglvd.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/fm6KqXpk3M2HVveHwCrBSSBaO0V.jpg", description: "История ученого, который возглавил Манхэттенский проект и столкнулся с последствиями собственного открытия.", reviews: [{ author: "Влад", text: "Плотный фильм, но актерская работа и монтаж держат все три часа." }, { author: "Катя", text: "После просмотра хочется читать дальше про реальную историю." }], placements: { home: true, recommended: false, genres: true, random: true } }
    ];
    const defaultMoods = ["Легкое", "Напряженное", "Романтика", "Подумать", "Для компании", "Перед сном"];
    const defaultCollections = ["Хочу посмотреть", "Лучшее на вечер", "После тяжелого дня", "Для двоих", "На выходные"];

    let state = loadState();
    let activeIndex = 0;
    let currentTab = "home";
    let currentGenre = "Все";
    let currentMood = "Все";
    let currentCollection = "Рекомендуемые";
    let randomMovie = moviePool("random")[0] || state.movies[0];
    let pointerStart = null;
    let dragX = 0;
    let dragged = false;
    let isAnimating = false;
    const imageCache = new Map();
    let currentDetailMovie = null;
    let lastDeckKey = "";
    let searchTimer = null;
    const stableMobileCards = matchMedia("(hover: none), (pointer: coarse)").matches;
    let userPrefs = loadUserPrefs();

    const $ = (selector) => document.querySelector(selector);
    const deck = $("#deck");
    const homeStage = $("#homeStage");
    const detail = $("#detail");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return { movies: defaultMovies, apiKey: "" };
      try {
        const parsed = JSON.parse(saved);
        const recommended = new Set(parsed.recommended || []);
        const movies = (parsed.movies?.length ? parsed.movies : defaultMovies).map((movie) => migrateMovie(movie, recommended));
        return { movies, apiKey: parsed.apiKey || "" };
      } catch {
        return { movies: defaultMovies, apiKey: "" };
      }
    }

    function migrateMovie(movie, recommended = new Set()) {
      const placements = { ...defaultPlacements, ...(movie.placements || {}) };
      if (recommended.has(movie.id)) placements.recommended = true;
      return {
        ...movie,
        moods: Array.isArray(movie.moods) ? movie.moods : [],
        collections: Array.isArray(movie.collections) ? movie.collections : [],
        adminPick: movie.adminPick || "",
        trailerId: movie.trailerId || "",
        placements
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadUserPrefs() {
      try {
        return { likes: [], dislikes: [], watchlist: [], ...(JSON.parse(localStorage.getItem("movieMoodPrefs")) || {}) };
      } catch {
        return { likes: [], dislikes: [], watchlist: [] };
      }
    }

    function saveUserPrefs() {
      localStorage.setItem("movieMoodPrefs", JSON.stringify(userPrefs));
    }

    function hasPref(type, movieId) {
      return userPrefs[type]?.includes(movieId);
    }

    function togglePref(type, movieId) {
      if (!movieId) return;
      const opposite = type === "likes" ? "dislikes" : type === "dislikes" ? "likes" : null;
      userPrefs[type] = hasPref(type, movieId) ? userPrefs[type].filter((id) => id !== movieId) : [...userPrefs[type], movieId];
      if (opposite) userPrefs[opposite] = userPrefs[opposite].filter((id) => id !== movieId);
      saveUserPrefs();
      updateDetailActions();
      if (currentTab === "recommended") renderRecommended();
    }

    function poster(movie) { return movie.poster || fallbackPoster; }
    function backdrop(movie) { return movie.backdrop || poster(movie); }
    function preloadImage(src) {
      if (!src) return Promise.resolve();
      if (imageCache.has(src)) return imageCache.get(src);
      const image = new Image();
      image.decoding = "async";
      image.loading = "eager";
      image.src = src;
      const ready = image.decode ? image.decode().catch(() => {}) : new Promise((resolve) => {
        image.onload = resolve;
        image.onerror = resolve;
      });
      imageCache.set(src, ready);
      return ready;
    }

    function warmMovieImages(list) {
      list.forEach((movie) => {
        preloadImage(poster(movie));
        preloadImage(backdrop(movie));
      });
    }

    function isPlaced(movie, place) { return movie.placements?.[place] !== false; }

    function moviePool(place) {
      return state.movies.filter((movie) => isPlaced(movie, place));
    }

    function filteredMovies() {
      const query = $("#searchInput").value.trim().toLowerCase();
      const movies = moviePool("home");
      if (!query) return movies;
      return movies.filter((movie) => `${movie.title} ${movie.genres.join(" ")}`.toLowerCase().includes(query));
    }

    function visibleMovies() {
      const list = filteredMovies();
      return list.length ? list : moviePool("home");
    }

    function deckKey(movies) {
      return movies.map((movie) => movie.id).join("|");
    }

    function applySearch() {
      const movies = visibleMovies();
      const nextKey = deckKey(movies);
      if (nextKey === lastDeckKey) return;
      lastDeckKey = nextKey;
      activeIndex = 0;
      renderDeck(movies);
    }

    function scheduleSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applySearch, 180);
    }

    function wrapIndex(index, total) {
      return (index + total) % total;
    }

    function circularDistance(index, active, total) {
      let distance = index - active;
      if (distance > total / 2) distance -= total;
      if (distance < -total / 2) distance += total;
      return distance;
    }

    function slotForDistance(distance, dx) {
      const progress = Math.min(Math.abs(dx) / 258, 1);
      const incoming = Math.abs(distance) === 1 && ((dx < 0 && distance > 0) || (dx > 0 && distance < 0));
      const outgoing = distance === 0;
      const visualDistance = distance + (dx / 258);
      const sideScale = Math.max(.78, 1 - Math.abs(visualDistance) * .08);

      if (!outgoing) {
        const side = {
          scale: sideScale,
          opacity: .42,
          blur: 3.2,
          brightness: .58
        };
        if (!incoming) return side;
        const focusProgress = Math.max(0, (progress - .55) / .45);
        const blur = side.blur - (side.blur - 1.35) * progress - 1.35 * focusProgress;
        return {
          scale: side.scale + (1 - side.scale) * focusProgress,
          opacity: side.opacity + (.82 - side.opacity) * progress + .18 * focusProgress,
          blur: Math.max(0, blur),
          brightness: side.brightness + (.78 - side.brightness) * progress + .22 * focusProgress
        };
      }

      return {
        scale: 1 + (sideScale - 1) * progress,
        opacity: 1 - progress * .58,
        blur: progress * 3.2,
        brightness: 1 - progress * .42
      };
    }

    function renderDeck(sourceMovies = visibleMovies()) {
      const movies = sourceMovies;
      lastDeckKey = deckKey(movies);
      activeIndex = Math.min(activeIndex, Math.max(0, movies.length - 1));
      const fragment = document.createDocumentFragment();
      if (!movies.length) {
        deck.innerHTML = '<p class="empty">Фильмы не найдены</p>';
        $("#movieInfo").innerHTML = "";
        return;
      }

      const distances = [-2, -1, 0, 1, 2];
      distances.forEach((distance) => {
        const index = wrapIndex(activeIndex + distance, movies.length);
        const movie = movies[index];
        preloadImage(poster(movie));
        const card = document.createElement("article");
        card.className = `movie-card${distance === 0 ? " is-active" : ""}`;
        card.dataset.distance = distance;
        card.dataset.index = index;
        card.dataset.id = movie.id;
        card.innerHTML = `<img src="${escapeHtml(poster(movie))}" alt="${escapeHtml(movie.title)}"><div class="rating-pill">★ ${escapeHtml(movie.rating)}</div>`;
        card.addEventListener("pointerdown", startDrag);
        card.addEventListener("click", openActiveCard);
        fragment.appendChild(card);
      });
      deck.replaceChildren(fragment);

      updateCarousel(0);
      renderMovieInfo(movies[activeIndex]);
    }

    function renderMovieInfo(movie) {
      const info = $("#movieInfo");
      info.innerHTML = `
        <h2>${escapeHtml(movie.title)}</h2>
        <div class="meta">${escapeHtml(movie.year)} · ${escapeHtml(movie.time)} · ★ ${escapeHtml(movie.rating)}</div>
        <p>${escapeHtml(movie.description)}</p>
      `;
    }

    function setCardMovie(card, movie) {
      card.dataset.id = movie.id;
      const image = card.querySelector("img");
      const rating = card.querySelector(".rating-pill");
      if (image && image.src !== poster(movie)) {
        image.src = poster(movie);
        image.alt = movie.title;
      }
      if (rating) rating.textContent = `★ ${movie.rating}`;
    }

    function openActiveCard(event) {
      const card = event.currentTarget;
      if (dragged || isAnimating || Number(card.dataset.distance) !== 0) return;
      const movie = visibleMovies()[activeIndex];
      if (movie) openDetail(movie);
    }

    function updateCarousel(dx) {
      const infoOpacity = 1 - Math.min(Math.abs(dx) / 135, .86);
      const info = $("#movieInfo");
      info.style.opacity = infoOpacity;
      info.style.transform = `translateY(${Math.abs(dx) * .025}px)`;
      deck.querySelectorAll(".movie-card").forEach((card) => {
        const distance = Number(card.dataset.distance);
        const baseX = distance * 258;
        const x = baseX + dx;
        const progress = Math.min(Math.abs(dx) / 258, 1);
        const visualDistance = distance + (dx / 258);
        const tilt = visualDistance * 1.4;
        const values = slotForDistance(distance, dx);
        card.style.zIndex = String(Math.round(10 - Math.min(Math.abs(visualDistance), 4)));
        card.style.transform = `translateX(${x}px) scale(${values.scale}) rotate(${tilt}deg)`;
        card.style.opacity = values.opacity;
        card.style.pointerEvents = Math.abs(visualDistance) < .5 ? "auto" : "none";
        card.classList.toggle("is-active", Math.abs(visualDistance) < .5);
        if (stableMobileCards) {
          card.style.filter = "none";
          card.style.setProperty("--card-dim", String(Math.max(0, Math.min(.52, 1 - values.brightness))));
        } else {
          card.style.filter = `blur(${values.blur}px) saturate(.76) brightness(${values.brightness})`;
          card.style.setProperty("--card-dim", "0");
        }
      });
    }

    function moveDeck(step) {
      if (isAnimating) return;
      const movies = visibleMovies();
      if (movies.length < 2) return;
      isAnimating = true;
      const finishDx = step > 0 ? -258 : 258;
      const info = $("#movieInfo");
      warmMovieImages(movies);
      homeStage.classList.remove("is-dragging");
      updateCarousel(finishDx);
      info.style.opacity = 0;
      info.style.transform = "translateY(8px)";
      setTimeout(() => {
        const nextIndex = wrapIndex(activeIndex + step, movies.length);
        activeIndex = nextIndex;
        dragX = 0;
        deck.classList.add("is-resetting");
        deck.querySelectorAll(".movie-card").forEach((card) => {
          let distance = Number(card.dataset.distance) - step;
          if (distance < -2) distance = 2;
          if (distance > 2) distance = -2;
          const movie = movies[wrapIndex(activeIndex + distance, movies.length)];
          card.dataset.distance = distance;
          card.dataset.index = wrapIndex(activeIndex + distance, movies.length);
          card.classList.toggle("is-active", distance === 0);
          if (Math.abs(distance) === 2) setCardMovie(card, movie);
        });
        updateCarousel(0);
        renderMovieInfo(movies[activeIndex]);
        const newInfo = $("#movieInfo");
        newInfo.style.opacity = 0;
        newInfo.style.transform = "translateY(8px)";
        requestAnimationFrame(() => deck.classList.remove("is-resetting"));
        setTimeout(() => deck.classList.remove("is-resetting"), 40);
        requestAnimationFrame(() => {
          newInfo.style.opacity = 1;
          newInfo.style.transform = "translateY(0)";
          isAnimating = false;
        });
      }, 520);
    }

    function startDrag(event) {
      if (isAnimating) return;
      if (Number(event.currentTarget.dataset.distance) !== 0) return;
      pointerStart = { x: event.clientX, y: event.clientY };
      dragged = false;
      dragX = 0;
      const card = event.currentTarget;
      homeStage.classList.add("is-dragging");
      card.setPointerCapture(event.pointerId);
      card.addEventListener("pointermove", dragCard);
      card.addEventListener("pointerup", endDrag, { once: true });
      card.addEventListener("pointercancel", endDrag, { once: true });
    }

    function dragCard(event) {
      if (!pointerStart) return;
      dragX = Math.max(-250, Math.min(250, event.clientX - pointerStart.x));
      if (Math.abs(dragX) > 8) dragged = true;
      updateCarousel(dragX);
    }

    function endDrag(event) {
      const card = event.currentTarget;
      card.removeEventListener("pointermove", dragCard);
      if (!pointerStart) return;
      const dx = dragX;
      pointerStart = null;
      if (Math.abs(dx) > 118) {
        moveDeck(dx > 0 ? -1 : 1);
      } else {
        homeStage.classList.remove("is-dragging");
        dragX = 0;
        updateCarousel(0);
      }
      setTimeout(() => { dragged = false; }, 0);
    }

    function renderRows(container, movies) {
      container.innerHTML = "";
      if (!movies.length) {
        container.innerHTML = '<p class="empty">Здесь пока пусто. Добавьте фильм через админку.</p>';
        return;
      }
      movies.forEach((movie) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "row-card";
        card.innerHTML = `<img src="${escapeHtml(poster(movie))}" alt="${escapeHtml(movie.title)}"><span><h3>${escapeHtml(movie.title)}</h3><p>${escapeHtml(movie.description)}</p><span class="score">★ ${escapeHtml(movie.rating)}</span></span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        card.addEventListener("click", () => openDetail(movie));
        container.appendChild(card);
      });
    }

    function allMoods() {
      return [...new Set([...defaultMoods, ...state.movies.flatMap((movie) => movie.moods || [])])];
    }

    function allCollections() {
      return [...new Set([...defaultCollections, ...state.movies.flatMap((movie) => movie.collections || [])])];
    }

    function renderChipBar(container, items, active, onPick) {
      container.innerHTML = items.map((item) => `<button class="chip${item === active ? " active" : ""}" type="button" data-value="${escapeHtml(item)}">${escapeHtml(item)}</button>`).join("");
      container.querySelectorAll("button").forEach((button) => button.addEventListener("click", () => onPick(button.dataset.value)));
    }

    function renderRecommended() {
      const collections = ["Рекомендуемые", ...allCollections()];
      renderChipBar($("#collectionBar"), collections, currentCollection, (value) => {
        currentCollection = value;
        renderRecommended();
      });
      let movies = moviePool("recommended");
      if (currentCollection === "Хочу посмотреть") {
        movies = state.movies.filter((movie) => hasPref("watchlist", movie.id));
      } else if (currentCollection !== "Рекомендуемые") {
        movies = state.movies.filter((movie) => movie.collections?.includes(currentCollection));
      }
      $("#recommendedCount").textContent = `${movies.length} фильмов`;
      renderRows($("#recommendedList"), movies);
    }

    function renderGenres() {
      const source = moviePool("genres");
      const moods = ["Все", ...allMoods()];
      renderChipBar($("#moodBar"), moods, currentMood, (value) => {
        currentMood = value;
        renderGenres();
      });
      const genres = ["Все", ...new Set(source.flatMap((movie) => movie.genres))];
      $("#genreBar").innerHTML = genres.map((genre) => `<button class="chip${genre === currentGenre ? " active" : ""}" type="button" data-genre="${escapeHtml(genre)}">${escapeHtml(genre)}</button>`).join("");
      $("#genreBar").querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          currentGenre = button.dataset.genre;
          renderGenres();
        });
      });
      const movies = source.filter((movie) => {
        const genreOk = currentGenre === "Все" || movie.genres.includes(currentGenre);
        const moodOk = currentMood === "Все" || movie.moods?.includes(currentMood);
        return genreOk && moodOk;
      });
      renderRows($("#genreList"), movies);
    }

    function smartRandomPool() {
      let pool = moviePool("random").filter((movie) => !hasPref("dislikes", movie.id));
      if (currentMood !== "Все") {
        const byMood = pool.filter((movie) => movie.moods?.includes(currentMood));
        if (byMood.length) pool = byMood;
      }
      const likedGenres = new Set(state.movies.filter((movie) => hasPref("likes", movie.id)).flatMap((movie) => movie.genres));
      return pool
        .map((movie) => ({
          movie,
          score:
            Number(movie.rating || 0) +
            (hasPref("likes", movie.id) ? 6 : 0) +
            (movie.adminPick ? 2 : 0) +
            movie.genres.reduce((sum, genre) => sum + (likedGenres.has(genre) ? .8 : 0), 0)
        }))
        .sort((a, b) => b.score - a.score)
        .map((item) => item.movie);
    }

    function renderRandom() {
      const pool = smartRandomPool();
      randomMovie = pool.includes(randomMovie) ? randomMovie : (pool[0] || state.movies[0]);
      $("#randomPoster").innerHTML = randomMovie ? `<img src="${escapeHtml(poster(randomMovie))}" alt="${escapeHtml(randomMovie.title)}">` : "";
      $("#randomHint").textContent = currentMood === "Все" ? "Умный подбор" : currentMood;
    }

    function youtubeTrailerUrl(movie) {
      const value = (movie?.trailerId || "").trim();
      if (value.includes("youtube.com") || value.includes("youtu.be")) return value;
      if (value) return `https://www.youtube.com/watch?v=${encodeURIComponent(value)}`;
      return `https://www.youtube.com/results?search_query=${encodeURIComponent(`${movie?.title || ""} трейлер`)}`;
    }

    function youtubeEmbedUrl(movie) {
      const value = (movie?.trailerId || "").trim();
      if (!value) return "";
      let id = value;
      if (value.includes("youtu.be/")) id = value.split("youtu.be/")[1].split(/[?&/]/)[0];
      if (value.includes("watch?v=")) id = value.split("watch?v=")[1].split(/[?&]/)[0];
      if (value.includes("/embed/")) id = value.split("/embed/")[1].split(/[?&/]/)[0];
      return `https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1&playsinline=1&rel=0`;
    }

    function openTrailer(movie) {
      if (!movie) return;
      const modal = $("#trailerModal");
      const frame = $("#trailerFrame");
      const fallback = $("#trailerFallback");
      const embedUrl = youtubeEmbedUrl(movie);
      const externalUrl = youtubeTrailerUrl(movie);
      $("#trailerTitle").textContent = movie.title;
      frame.innerHTML = embedUrl
        ? `<iframe src="${embedUrl}" title="Трейлер ${movie.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`
        : "";
      fallback.style.display = embedUrl ? "none" : "block";
      fallback.innerHTML = `YouTube ID не указан. <a href="${externalUrl}" target="_blank" rel="noopener">Открыть поиск на YouTube</a>`;
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeTrailer() {
      $("#trailerModal").classList.remove("active");
      $("#trailerModal").setAttribute("aria-hidden", "true");
      $("#trailerFrame").innerHTML = "";
      $("#trailerFallback").innerHTML = "";
    }

    function openDetail(movie) {
      if (!movie) return;
      currentDetailMovie = movie;
      randomMovie = movie;
      $("#detailHero").style.backgroundImage = `url("${encodeURI(backdrop(movie))}")`;
      $("#detailTitle").textContent = movie.title;
      $("#detailMeta").innerHTML = `<span>★ ${escapeHtml(movie.rating)}</span><span>${escapeHtml(movie.year)}</span><span>${escapeHtml(movie.time)}</span><span>HD</span><span>${escapeHtml(movie.genres.join(", "))}</span>`;
      $("#detailAdminPick").innerHTML = movie.adminPick ? `<span class="admin-pick">${escapeHtml(movie.adminPick)}</span>` : "";
      $("#detailDescription").textContent = movie.description;
      $("#detailReviews").innerHTML = movie.reviews.map((review) => `<div class="review"><b>${escapeHtml(review.author)}:</b> ${escapeHtml(review.text)}</div>`).join("");
      updateDetailActions();
      detail.classList.add("active");
      detail.setAttribute("aria-hidden", "false");
    }

    function updateDetailActions() {
      if (!currentDetailMovie) return;
      $("#likeBtn").classList.toggle("active", hasPref("likes", currentDetailMovie.id));
      $("#dislikeBtn").classList.toggle("active", hasPref("dislikes", currentDetailMovie.id));
      $("#watchBtn").classList.toggle("active", hasPref("watchlist", currentDetailMovie.id));
    }

    function closeDetail() {
      detail.classList.remove("active");
      detail.setAttribute("aria-hidden", "true");
      currentDetailMovie = null;
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.toggle("active", screen.id === tab));
      document.querySelectorAll(".nav-btn").forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
      if (tab === "recommended") renderRecommended();
      if (tab === "genres") renderGenres();
      if (tab === "random") renderRandom();
    }

    function addRecommendation(movieId) {
      const movie = state.movies.find((item) => item.id === movieId);
      if (movie) {
        movie.placements = { ...defaultPlacements, ...movie.placements, recommended: true };
        saveState();
      }
      renderRecommended();
    }

    function openAdminGate() {
      window.location.href = "admin.html";
    }

    function renderAll() {
      renderDeck();
      renderRecommended();
      renderGenres();
      renderRandom();
    }

    async function startCloudSync() {
      try {
        const cloud = await import("./firebase-db.js");
        if (!cloud.isFirebaseEnabled()) return;
        await cloud.listenMovies((movies) => {
          if (!movies.length) return;
          state.movies = movies.map((movie) => migrateMovie(movie));
          saveState();
          activeIndex = 0;
          warmMovieImages(state.movies);
          renderAll();
        }, (error) => console.warn("Firebase movies sync failed", error));
      } catch (error) {
        console.warn("Firebase is unavailable, local movies are used", error);
      }
    }

    document.querySelectorAll(".nav-btn").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    $("#closeDetail").addEventListener("click", closeDetail);
    $("#closeTrailer").addEventListener("click", closeTrailer);
    $("#trailerModal").addEventListener("click", (event) => {
      if (event.target.id === "trailerModal") closeTrailer();
    });
    $("#searchInput").addEventListener("input", scheduleSearch);
    $("#adminEntry").addEventListener("click", openAdminGate);
    $("#randomBtn").addEventListener("click", () => {
      const pool = smartRandomPool();
      randomMovie = pool[Math.floor(Math.random() * pool.length)] || state.movies[0];
      renderRandom();
      openDetail(randomMovie);
    });
    $("#addCurrent").addEventListener("click", () => {
      const movie = visibleMovies()[activeIndex] || randomMovie;
      addRecommendation(movie.id);
    });
    $("#trailerBtn").addEventListener("click", () => {
      if (!currentDetailMovie) return;
      openTrailer(currentDetailMovie);
    });
    $("#likeBtn").addEventListener("click", () => togglePref("likes", currentDetailMovie?.id));
    $("#dislikeBtn").addEventListener("click", () => togglePref("dislikes", currentDetailMovie?.id));
    $("#watchBtn").addEventListener("click", () => togglePref("watchlist", currentDetailMovie?.id));
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDetail();
        closeTrailer();
      }
      if (currentTab === "home" && event.key === "ArrowRight") moveDeck(1);
      if (currentTab === "home" && event.key === "ArrowLeft") moveDeck(-1);
    });

    const searchInput = $("#searchInput");
    if (searchInput.value.includes("@")) searchInput.value = "";
    function clearAutofilledSearch() {
      if (!searchInput.value.includes("@")) return;
      searchInput.value = "";
      activeIndex = 0;
      applySearch();
    }
    window.addEventListener("pageshow", clearAutofilledSearch);
    window.addEventListener("load", clearAutofilledSearch);
    searchInput.addEventListener("focus", clearAutofilledSearch);
    [100, 350, 800, 1500, 3000].forEach((delay) => setTimeout(clearAutofilledSearch, delay));
    warmMovieImages(state.movies);
    renderAll();
    startCloudSync();

    const isLocalPreview = ["127.0.0.1", "localhost"].includes(location.hostname);
    if ("serviceWorker" in navigator && location.protocol !== "file:" && !isLocalPreview) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js?v=14").catch(() => {});
      });
    }
  </script>
</body>
</html>
