<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Mood</title>
  <style>
    :root {
      --bg: #070a12;
      --ink: #f7f8ff;
      --muted: #a8adbf;
      --line: rgba(255,255,255,.13);
      --gold: #ffc84d;
      --teal: #42dcc6;
      --blue: #83aaff;
      --shadow: 0 24px 80px rgba(0,0,0,.42);
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 5%, rgba(66,220,198,.17), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(255,95,117,.14), transparent 30%),
        linear-gradient(145deg, #111322 0%, #080b14 44%, #05070d 100%);
      overflow-x: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; color: inherit; cursor: pointer; }

    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 22px 104px;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 46px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hello p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #111322;
      font-weight: 900;
      background: linear-gradient(145deg, #a3e7ff, #ff8092);
      box-shadow: 0 10px 28px rgba(255,95,117,.22);
    }

    .search {
      height: 62px;
      display: grid;
      grid-template-columns: 26px 1fr 34px;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      margin-bottom: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(32,34,53,.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .search input {
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-size: 16px;
    }

    .search input::placeholder { color: #747b91; }

    .voice {
      height: 30px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border-left: 1px solid var(--line);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .deck-zone {
      height: 535px;
      position: relative;
      display: grid;
      place-items: center;
      touch-action: pan-y;
      user-select: none;
    }

    .movie-card {
      width: min(68vw, 292px);
      aspect-ratio: 2 / 3;
      position: absolute;
      overflow: hidden;
      border-radius: 24px;
      background: #151927;
      box-shadow: var(--shadow);
      transform-origin: center;
      transition: transform .32s ease, opacity .32s ease, filter .32s ease;
    }

    .movie-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .movie-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 47%, rgba(0,0,0,.82) 100%);
    }

    .movie-card.is-active {
      z-index: 5;
      cursor: grab;
    }

    .rating-pill {
      position: absolute;
      z-index: 2;
      left: 16px;
      bottom: 96px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(10,12,20,.68);
      backdrop-filter: blur(10px);
      font-weight: 850;
      font-size: 14px;
    }

    .title-strip {
      position: absolute;
      z-index: 2;
      left: 16px;
      right: 16px;
      bottom: 20px;
    }

    .title-strip h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.08;
    }

    .title-strip p {
      margin: 0;
      color: rgba(255,255,255,.76);
      font-size: 14px;
    }

    .tap-hint {
      position: absolute;
      bottom: 20px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .primary, .ghost, .chip, .admin-toggle {
      min-height: 46px;
      border-radius: 999px;
      padding: 0 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(12px);
    }

    .primary {
      color: #121522;
      background: #f8f9ff;
      font-weight: 850;
    }

    .ghost {
      color: var(--ink);
      background: rgba(255,255,255,.08);
      font-weight: 750;
    }

    .list-grid { display: grid; gap: 14px; }

    .row-card {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: left;
      background: rgba(255,255,255,.07);
    }

    .row-card img {
      width: 76px;
      height: 108px;
      object-fit: cover;
      border-radius: 8px;
    }

    .row-card h3 {
      margin: 0 0 7px;
      font-size: 17px;
    }

    .row-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .score {
      display: inline-flex;
      gap: 5px;
      margin-top: 9px;
      color: var(--gold);
      font-weight: 850;
      font-size: 14px;
    }

    .genre-bar {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 2px 0 16px;
      scrollbar-width: none;
    }

    .genre-bar::-webkit-scrollbar { display: none; }

    .chip {
      min-height: 38px;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip.active {
      color: #071016;
      background: var(--teal);
      border-color: transparent;
      font-weight: 850;
    }

    .random-stage {
      min-height: 520px;
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .random-poster {
      width: min(82vw, 330px);
      margin: 0 auto;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .random-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .admin-toggle {
      width: 100%;
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--blue);
      font-weight: 850;
    }

    .admin-panel {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(10,13,24,.72);
    }

    .admin-panel.active { display: block; }

    .field { display: grid; gap: 7px; margin-bottom: 12px; }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      color: var(--ink);
      background: rgba(255,255,255,.08);
      padding: 12px;
    }

    .field textarea { resize: vertical; min-height: 82px; }
    .admin-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .detail {
      position: fixed;
      inset: 0;
      z-index: 30;
      overflow-y: auto;
      background: #080b14;
      transform: translateY(100%);
      transition: transform .36s ease;
    }

    .detail.active { transform: translateY(0); }

    .detail-hero {
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
      display: grid;
      align-items: end;
      padding: 18px 18px 24px;
      background-size: cover;
      background-position: center;
    }

    .detail-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5,7,13,.1), rgba(5,7,13,.26) 42%, rgba(5,7,13,.84));
    }

    .detail-top {
      position: absolute;
      z-index: 2;
      inset: 18px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(12px);
    }

    .side-actions { display: grid; gap: 10px; }

    .detail-sheet {
      position: relative;
      z-index: 1;
      padding: 24px;
      border-radius: 24px;
      background: rgba(29,24,23,.58);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }

    .detail-sheet h2 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }

    .description {
      margin: 0 0 18px;
      color: rgba(255,255,255,.84);
      line-height: 1.5;
      font-size: 15px;
    }

    .reviews {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .review {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.09);
      color: rgba(255,255,255,.86);
      font-size: 13px;
      line-height: 1.42;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 20;
      width: min(calc(100% - 32px), 420px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(9,12,22,.74);
      backdrop-filter: blur(22px);
      box-shadow: 0 18px 60px rgba(0,0,0,.4);
    }

    .nav-btn {
      min-width: 0;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 4px;
      color: #858ba0;
      background: transparent;
      font-size: 11px;
      font-weight: 850;
    }

    .nav-btn svg { width: 22px; height: 22px; }

    .nav-btn.active {
      color: #fff;
      background: rgba(255,255,255,.1);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 50px 16px;
    }

    @media (max-width: 380px) {
      .app { padding-inline: 16px; }
      .deck-zone { height: 500px; }
      .movie-card { width: 74vw; }
      .nav-btn { font-size: 10px; }
      .detail-sheet { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="hello">
        <h1>Movie Mood</h1>
        <p>Подберем фильм на вечер</p>
      </div>
      <div class="avatar">M</div>
    </header>

    <label class="search">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="search" placeholder="Поиск фильма">
      <span class="voice" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 0 1-14 0M12 18v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
    </label>

    <section id="home" class="screen active">
      <div class="section-head">
        <h2>Главная</h2>
        <span>Свайпайте постеры</span>
      </div>
      <div id="deck" class="deck-zone" aria-label="Свайп фильмов"></div>
    </section>

    <section id="recommended" class="screen">
      <div class="section-head">
        <h2>Рекомендуемые</h2>
        <span id="recommendedCount"></span>
      </div>
      <div id="recommendedList" class="list-grid"></div>
      <button id="adminToggle" class="admin-toggle" type="button">Админ</button>
      <form id="adminPanel" class="admin-panel">
        <h3>Редактор рекомендаций</h3>
        <div class="field">
          <label for="apiKey">TMDb API key</label>
          <input id="apiKey" autocomplete="off" placeholder="Вставьте ключ TMDb">
        </div>
        <div class="field">
          <label for="movieSelect">Фильм</label>
          <select id="movieSelect"></select>
        </div>
        <div class="field">
          <label for="customTitle">Своя рекомендация</label>
          <input id="customTitle" placeholder="Название фильма">
        </div>
        <div class="field">
          <label for="customPoster">Ссылка на постер</label>
          <input id="customPoster" placeholder="https://...">
        </div>
        <div class="field">
          <label for="customNote">Комментарий коллекции</label>
          <textarea id="customNote" placeholder="Почему стоит посмотреть"></textarea>
        </div>
        <div class="admin-actions">
          <button class="primary" type="button" id="saveRecommendation">В коллекцию</button>
          <button class="ghost" type="button" id="loadTmdb">TMDb</button>
        </div>
      </form>
    </section>

    <section id="genres" class="screen">
      <div class="section-head">
        <h2>По жанру</h2>
        <span>Выберите настроение</span>
      </div>
      <div id="genreBar" class="genre-bar"></div>
      <div id="genreList" class="list-grid"></div>
    </section>

    <section id="random" class="screen">
      <div class="section-head">
        <h2>Рандомный фильм</h2>
        <span>Один тап</span>
      </div>
      <div class="random-stage">
        <div id="randomPoster" class="random-poster"></div>
        <button id="randomBtn" class="primary" type="button">Подобрать фильм</button>
      </div>
    </section>
  </main>

  <aside id="detail" class="detail" aria-hidden="true">
    <div id="detailHero" class="detail-hero">
      <div class="detail-top">
        <button id="closeDetail" class="icon-btn" type="button" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none"><path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="side-actions">
          <button class="icon-btn" type="button" id="addCurrent" aria-label="Добавить"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <button class="icon-btn" type="button" aria-label="Нравится"><svg viewBox="0 0 24 24" fill="none"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
      <div class="detail-sheet">
        <h2 id="detailTitle"></h2>
        <div id="detailMeta" class="meta"></div>
        <p id="detailDescription" class="description"></p>
        <div id="detailReviews" class="reviews"></div>
        <div class="detail-actions">
          <button class="primary" type="button">Смотреть</button>
          <button class="ghost" type="button" id="trailerBtn">Трейлер</button>
        </div>
      </div>
    </div>
  </aside>

  <nav class="bottom-nav" aria-label="Главное меню">
    <button class="nav-btn active" type="button" data-tab="home" aria-label="Главная"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5 12 4l9 7.5V21h-6v-5.5H9V21H3v-9.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>Главная</button>
    <button class="nav-btn" type="button" data-tab="recommended" aria-label="Рекомендуемые"><svg viewBox="0 0 24 24" fill="none"><path d="M7 5h10a2 2 0 0 1 2 2v14l-7-4-7 4V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>Рекоменд.</button>
    <button class="nav-btn" type="button" data-tab="genres" aria-label="По жанру"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 12h16M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 5v14M16 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Жанры</button>
    <button class="nav-btn" type="button" data-tab="random" aria-label="Рандомный фильм"><svg viewBox="0 0 24 24" fill="none"><path d="M16 3h5v5M21 3l-7.5 7.5M4 20l6.5-6.5M15 20h6v-6M21 20l-7.5-7.5M4 4l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Рандом</button>
  </nav>

  <script>
    const STORAGE_KEY = "movieMoodState";
    const imageBase = "https://image.tmdb.org/t/p/w780";
    const fallbackPoster = "https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=780&q=80";

    const defaultMovies = [
      { id: "finch", title: "Finch", year: 2021, time: "115 мин", rating: 6.9, genres: ["Приключения", "Драма", "Sci-Fi"], poster: "https://image.tmdb.org/t/p/w780/jKuDyqx7jrjiR9cDzB5pxzhJAdv.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/oE6bhqqVFyIECtBzqIuvh6JdaB5.jpg", description: "Робот, созданный инженером после глобальной катастрофы, учится заботиться о собаке своего создателя и понимать, что делает людей людьми.", reviews: [{ author: "Ирина", text: "Спокойная фантастика с теплой эмоцией. Идеально для вечера без суеты." }, { author: "Максим", text: "Том Хэнкс вытягивает даже тишину, а робот неожиданно трогательный." }] },
      { id: "dune-2", title: "Дюна: Часть вторая", year: 2024, time: "166 мин", rating: 8.5, genres: ["Фантастика", "Драма", "Приключения"], poster: "https://image.tmdb.org/t/p/w780/8b8R8l88Qje9dn9OE8PY05Nxl1X.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/xOMo8BRK7PfcJv9JCnx7s5hj0PX.jpg", description: "Пол Атрейдес объединяется с фременами и идет к судьбе, которая может изменить Арракис и всю империю.", reviews: [{ author: "Артем", text: "Монументально, красиво и очень мощно на большом экране." }, { author: "Лена", text: "Вторая часть заметно быстрее первой, а музыка держит напряжение." }] },
      { id: "godzilla", title: "Monarch: Legacy of Monsters", year: 2023, time: "1 сезон", rating: 8.4, genres: ["Sci-Fi", "Драма", "Экшен"], poster: "https://image.tmdb.org/t/p/w780/uwrQHMnXD2DA1rvaMZk4pavZ3CY.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/628Dep6AxEtDxjZoGP78TsOxYbK.jpg", description: "После атаки Годзиллы семья раскрывает связь с тайной организацией Monarch и наследием огромных монстров.", reviews: [{ author: "Сергей", text: "Семейная драма работает лучше, чем ожидал, а монстры появляются вовремя." }, { author: "Ника", text: "Красиво снято, хорошо идет как сериал на несколько вечеров." }] },
      { id: "poor-things", title: "Бедные-несчастные", year: 2023, time: "142 мин", rating: 7.8, genres: ["Комедия", "Драма", "Фэнтези"], poster: "https://image.tmdb.org/t/p/w780/kCGlIMHnOm8JPXq3rXM6c5wMxcT.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/bQS43HSLZzMjZkcHJz4fGc7fNdz.jpg", description: "Белла Бакстер открывает мир заново, превращая странное путешествие в историю свободы, любопытства и взросления.", reviews: [{ author: "Оля", text: "Очень необычно, визуально роскошно, местами смешно до неловкости." }, { author: "Денис", text: "Фильм не для всех, но если зайдет, запомнится надолго." }] },
      { id: "oppenheimer", title: "Оппенгеймер", year: 2023, time: "181 мин", rating: 8.1, genres: ["История", "Драма", "Биография"], poster: "https://image.tmdb.org/t/p/w780/ptpr0kGAckfQkJeJIt8st5dglvd.jpg", backdrop: "https://image.tmdb.org/t/p/w1280/fm6KqXpk3M2HVveHwCrBSSBaO0V.jpg", description: "История ученого, который возглавил Манхэттенский проект и столкнулся с последствиями собственного открытия.", reviews: [{ author: "Влад", text: "Плотный фильм, но актерская работа и монтаж держат все три часа." }, { author: "Катя", text: "После просмотра хочется читать дальше про реальную историю." }] }
    ];

    let state = loadState();
    let activeIndex = 0;
    let currentTab = "home";
    let currentGenre = "Все";
    let randomMovie = state.movies[0];
    let pointerStart = null;
    let dragged = false;

    const $ = (selector) => document.querySelector(selector);
    const deck = $("#deck");
    const detail = $("#detail");

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return { movies: defaultMovies, recommended: ["dune-2", "godzilla"], apiKey: "" };
      try {
        const parsed = JSON.parse(saved);
        return {
          movies: parsed.movies?.length ? parsed.movies : defaultMovies,
          recommended: Array.isArray(parsed.recommended) ? parsed.recommended : ["dune-2", "godzilla"],
          apiKey: parsed.apiKey || ""
        };
      } catch {
        return { movies: defaultMovies, recommended: ["dune-2", "godzilla"], apiKey: "" };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function poster(movie) { return movie.poster || fallbackPoster; }
    function backdrop(movie) { return movie.backdrop || poster(movie); }

    function filteredMovies() {
      const query = $("#searchInput").value.trim().toLowerCase();
      if (!query) return state.movies;
      return state.movies.filter((movie) => `${movie.title} ${movie.genres.join(" ")}`.toLowerCase().includes(query));
    }

    function visibleMovies() {
      const list = filteredMovies();
      return list.length ? list : state.movies;
    }

    function renderDeck() {
      const movies = visibleMovies();
      activeIndex = Math.min(activeIndex, movies.length - 1);
      deck.innerHTML = "";
      if (!movies.length) {
        deck.innerHTML = '<p class="empty">Фильмы не найдены</p>';
        return;
      }
      movies.forEach((movie, index) => {
        const offset = index - activeIndex;
        if (Math.abs(offset) > 2) return;
        const card = document.createElement("article");
        card.className = `movie-card${offset === 0 ? " is-active" : ""}`;
        card.dataset.id = movie.id;
        card.style.transform = `translateX(${offset * 78}px) scale(${1 - Math.abs(offset) * .08}) rotate(${offset * 4}deg)`;
        card.style.opacity = offset === 0 ? "1" : ".42";
        card.style.filter = offset === 0 ? "none" : "blur(3px) saturate(.55) brightness(.58)";
        card.innerHTML = `
          <img src="${poster(movie)}" alt="${movie.title}">
          <div class="rating-pill">★ ${movie.rating}</div>
          <div class="title-strip">
            <h3>${movie.title}</h3>
            <p>${movie.year} · ${movie.genres.slice(0, 2).join(", ")}</p>
          </div>`;
        if (offset === 0) {
          card.addEventListener("pointerdown", startDrag);
          card.addEventListener("click", () => {
            if (!dragged) openDetail(movie);
          });
        }
        deck.appendChild(card);
      });
      const hint = document.createElement("div");
      hint.className = "tap-hint";
      hint.textContent = "Нажмите на постер, чтобы открыть описание";
      deck.appendChild(hint);
    }

    function moveDeck(step) {
      const movies = visibleMovies();
      activeIndex = (activeIndex + step + movies.length) % movies.length;
      renderDeck();
    }

    function startDrag(event) {
      pointerStart = { x: event.clientX, y: event.clientY };
      dragged = false;
      const card = event.currentTarget;
      card.setPointerCapture(event.pointerId);
      card.addEventListener("pointermove", dragCard);
      card.addEventListener("pointerup", endDrag, { once: true });
    }

    function dragCard(event) {
      if (!pointerStart) return;
      const dx = event.clientX - pointerStart.x;
      if (Math.abs(dx) > 8) dragged = true;
      const card = event.currentTarget;
      card.style.transition = "none";
      card.style.transform = `translateX(${dx}px) rotate(${dx / 14}deg)`;
    }

    function endDrag(event) {
      const card = event.currentTarget;
      card.removeEventListener("pointermove", dragCard);
      if (!pointerStart) return;
      const dx = event.clientX - pointerStart.x;
      pointerStart = null;
      card.style.transition = "";
      if (Math.abs(dx) > 70) moveDeck(dx > 0 ? -1 : 1);
      else renderDeck();
      setTimeout(() => { dragged = false; }, 0);
    }

    function renderRows(container, movies) {
      container.innerHTML = "";
      if (!movies.length) {
        container.innerHTML = '<p class="empty">Здесь пока пусто. Добавьте фильм через админку.</p>';
        return;
      }
      movies.forEach((movie) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "row-card";
        card.innerHTML = `
          <img src="${poster(movie)}" alt="${movie.title}">
          <span><h3>${movie.title}</h3><p>${movie.description}</p><span class="score">★ ${movie.rating}</span></span>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        card.addEventListener("click", () => openDetail(movie));
        container.appendChild(card);
      });
    }

    function renderRecommended() {
      const movies = state.movies.filter((movie) => state.recommended.includes(movie.id));
      $("#recommendedCount").textContent = `${movies.length} фильмов`;
      renderRows($("#recommendedList"), movies);
      renderMovieSelect();
    }

    function renderMovieSelect() {
      $("#movieSelect").innerHTML = state.movies.map((movie) => `<option value="${movie.id}">${movie.title}</option>`).join("");
      $("#apiKey").value = state.apiKey;
    }

    function renderGenres() {
      const genres = ["Все", ...new Set(state.movies.flatMap((movie) => movie.genres))];
      $("#genreBar").innerHTML = genres.map((genre) => `<button class="chip${genre === currentGenre ? " active" : ""}" type="button" data-genre="${genre}">${genre}</button>`).join("");
      $("#genreBar").querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          currentGenre = button.dataset.genre;
          renderGenres();
        });
      });
      const movies = currentGenre === "Все" ? state.movies : state.movies.filter((movie) => movie.genres.includes(currentGenre));
      renderRows($("#genreList"), movies);
    }

    function renderRandom() {
      $("#randomPoster").innerHTML = `<img src="${poster(randomMovie)}" alt="${randomMovie.title}">`;
    }

    function openDetail(movie) {
      randomMovie = movie;
      $("#detailHero").style.backgroundImage = `url("${backdrop(movie)}")`;
      $("#detailTitle").textContent = movie.title;
      $("#detailMeta").innerHTML = `<span>★ ${movie.rating}</span><span>${movie.year}</span><span>${movie.time}</span><span>HD</span><span>${movie.genres.join(", ")}</span>`;
      $("#detailDescription").textContent = movie.description;
      $("#detailReviews").innerHTML = movie.reviews.map((review) => `<div class="review"><b>${review.author}:</b> ${review.text}</div>`).join("");
      detail.classList.add("active");
      detail.setAttribute("aria-hidden", "false");
    }

    function closeDetail() {
      detail.classList.remove("active");
      detail.setAttribute("aria-hidden", "true");
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.toggle("active", screen.id === tab));
      document.querySelectorAll(".nav-btn").forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
      if (tab === "recommended") renderRecommended();
      if (tab === "genres") renderGenres();
      if (tab === "random") renderRandom();
    }

    function addRecommendation(movieId) {
      if (!state.recommended.includes(movieId)) {
        state.recommended.unshift(movieId);
        saveState();
      }
      renderRecommended();
    }

    function addCustomRecommendation() {
      const title = $("#customTitle").value.trim();
      const selectedId = $("#movieSelect").value;
      if (!title) {
        addRecommendation(selectedId);
        return;
      }
      const id = `custom-${Date.now()}`;
      const custom = {
        id,
        title,
        year: new Date().getFullYear(),
        time: "По выбору",
        rating: 8.0,
        genres: ["Рекомендация"],
        poster: $("#customPoster").value.trim() || fallbackPoster,
        backdrop: $("#customPoster").value.trim() || fallbackPoster,
        description: $("#customNote").value.trim() || "Личная рекомендация из админ-коллекции.",
        reviews: [{ author: "Админ", text: $("#customNote").value.trim() || "Добавлено вручную в подборку." }]
      };
      state.movies.unshift(custom);
      state.recommended.unshift(id);
      saveState();
      $("#customTitle").value = "";
      $("#customPoster").value = "";
      $("#customNote").value = "";
      activeIndex = 0;
      renderAll();
      setTab("recommended");
    }

    async function loadTmdbMovies() {
      const key = $("#apiKey").value.trim();
      if (!key) {
        alert("Вставьте TMDb API key в поле выше.");
        return;
      }
      state.apiKey = key;
      saveState();
      try {
        const response = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${encodeURIComponent(key)}&language=ru-RU&page=1`);
        if (!response.ok) throw new Error("TMDb error");
        const data = await response.json();
        const imported = data.results.slice(0, 10).map((item) => ({
          id: `tmdb-${item.id}`,
          title: item.title || item.original_title,
          year: (item.release_date || "").slice(0, 4) || "2026",
          time: "TMDb",
          rating: Number(item.vote_average || 0).toFixed(1),
          genres: ["TMDb", "Популярное"],
          poster: item.poster_path ? imageBase + item.poster_path : fallbackPoster,
          backdrop: item.backdrop_path ? "https://image.tmdb.org/t/p/w1280" + item.backdrop_path : "",
          description: item.overview || "Описание будет доступно после обновления данных TMDb.",
          reviews: [{ author: "TMDb", text: `Средняя оценка зрителей: ${Number(item.vote_average || 0).toFixed(1)}.` }, { author: "Movie Mood", text: "Добавлено из популярной подборки TMDb." }]
        }));
        const known = new Set(state.movies.map((movie) => movie.id));
        state.movies = [...imported.filter((movie) => !known.has(movie.id)), ...state.movies];
        saveState();
        activeIndex = 0;
        renderAll();
        alert("Фильмы TMDb загружены.");
      } catch {
        alert("Не удалось загрузить TMDb. Проверьте ключ и интернет.");
      }
    }

    function renderAll() {
      renderDeck();
      renderRecommended();
      renderGenres();
      renderRandom();
    }

    document.querySelectorAll(".nav-btn").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    $("#closeDetail").addEventListener("click", closeDetail);
    $("#searchInput").addEventListener("input", () => {
      activeIndex = 0;
      renderDeck();
    });
    $("#adminToggle").addEventListener("click", () => $("#adminPanel").classList.toggle("active"));
    $("#saveRecommendation").addEventListener("click", addCustomRecommendation);
    $("#loadTmdb").addEventListener("click", loadTmdbMovies);
    $("#randomBtn").addEventListener("click", () => {
      const movies = state.movies;
      randomMovie = movies[Math.floor(Math.random() * movies.length)];
      renderRandom();
      openDetail(randomMovie);
    });
    $("#addCurrent").addEventListener("click", () => {
      const movie = visibleMovies()[activeIndex] || randomMovie;
      addRecommendation(movie.id);
    });
    $("#trailerBtn").addEventListener("click", () => alert("Здесь можно подключить трейлеры TMDb Videos API."));
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDetail();
      if (currentTab === "home" && event.key === "ArrowRight") moveDeck(1);
      if (currentTab === "home" && event.key === "ArrowLeft") moveDeck(-1);
    });

    renderAll();
  </script>
</body>
</html>
